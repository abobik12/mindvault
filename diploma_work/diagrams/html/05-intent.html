<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Алгоритм различения запроса и команды сохранения</title>
<style>
  body { margin: 0; background: #f8fafc; }
  .wrap { width: 1180px; margin: 0 auto; padding: 28px 0; }
  svg { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 12px 30px rgba(15,23,42,.08); }
</style>
</head>
<body>
<div class="wrap">
<svg width="1180" height="760" viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
  </marker>
</defs>
<text x="590" y="42" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#111827"><tspan x="590" dy="0">Алгоритм различения запроса и команды сохранения</tspan></text>
<rect x="475" y="85" width="230" height="70" rx="14" fill="#eff6ff" stroke="#93c5fd" stroke-width="2"/><text x="590" y="118" text-anchor="middle" font-family="Arial" font-size="17" font-weight="600" fill="#0f172a"><tspan x="590" dy="0">Сообщение пользователя</tspan></text>
<rect x="430" y="210" width="320" height="90" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/><text x="590" y="243" text-anchor="middle" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a"><tspan x="590" dy="0">Есть явная команда?</tspan><tspan x="590" dy="21">заметка / список / напоминание</tspan></text>
<rect x="120" y="370" width="260" height="100" rx="14" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/><text x="250" y="403" text-anchor="middle" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a"><tspan x="250" dy="0">Нет</tspan><tspan x="250" dy="21">обычный вопрос</tspan><tspan x="250" dy="21">ответ без автосохранения</tspan></text>
<rect x="460" y="370" width="260" height="100" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/><text x="590" y="403" text-anchor="middle" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a"><tspan x="590" dy="0">Да</tspan><tspan x="590" dy="21">создать объект</tspan><tspan x="590" dy="21">после записи в БД</tspan></text>
<rect x="800" y="370" width="260" height="100" rx="14" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="2"/><text x="930" y="403" text-anchor="middle" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a"><tspan x="930" dy="0">Спорно</tspan><tspan x="930" dy="21">предложить выбор</tspan><tspan x="930" dy="21">не выполнять автоматически</tspan></text>
<rect x="460" y="555" width="260" height="95" rx="14" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/><text x="590" y="588" text-anchor="middle" font-family="Arial" font-size="16" font-weight="600" fill="#0f172a"><tspan x="590" dy="0">Подтверждение</tspan><tspan x="590" dy="21">только после success</tspan><tspan x="590" dy="21">на backend</tspan></text>
<line x1="590" y1="155" x2="590" y2="210" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>
<line x1="430" y1="255" x2="250" y2="370" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/><text x="340" y="304.5" text-anchor="middle" font-family="Arial" font-size="13" font-weight="400" fill="#475569"><tspan x="340" dy="0">нет</tspan></text>
<line x1="590" y1="300" x2="590" y2="370" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/><text x="590" y="327" text-anchor="middle" font-family="Arial" font-size="13" font-weight="400" fill="#475569"><tspan x="590" dy="0">да</tspan></text>
<line x1="750" y1="255" x2="930" y2="370" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/><text x="840" y="304.5" text-anchor="middle" font-family="Arial" font-size="13" font-weight="400" fill="#475569"><tspan x="840" dy="0">низкая уверенность</tspan></text>
<line x1="590" y1="470" x2="590" y2="555" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrow)"/>
</svg>
</div>
</body>
</html>
