<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #374151; stroke-width: 2; rx: 12; }
      .box2 { fill: #eef6ff; stroke: #374151; stroke-width: 2; rx: 12; }
      .box3 { fill: #f5f7eb; stroke: #374151; stroke-width: 2; rx: 12; }
      .box4 { fill: #fff7ed; stroke: #374151; stroke-width: 2; rx: 12; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .text { font: 400 17px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 15px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line { stroke: #6b7280; stroke-width: 1.8; fill: none; }
      .note { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="900"/>
<text x="44" y="50" class="title"><tspan x="44" dy="0">Схема базы данных приложения MindVault</tspan></text><text x="44" y="82" class="subtitle"><tspan x="44" dy="0">Основные таблицы PostgreSQL и связи между пользовательскими данными</tspan></text>
  <rect class="box2" x="70" y="150" width="250" height="170" rx="10"/>
  <text x="86" y="180" class="label"><tspan x="86" dy="0">users</tspan></text><text x="88" y="210" class="text">id PK</text><text x="88" y="234" class="text">email unique</text><text x="88" y="258" class="text">passwordHash</text><text x="88" y="282" class="text">fullName</text>
  <rect class="box" x="470" y="120" width="270" height="195" rx="10"/>
  <text x="486" y="150" class="label"><tspan x="486" dy="0">folders</tspan></text><text x="488" y="180" class="text">id PK</text><text x="488" y="204" class="text">userId FK</text><text x="488" y="228" class="text">name</text><text x="488" y="252" class="text">color, icon</text><text x="488" y="276" class="text">isSystem</text>
  <rect class="box3" x="465" y="430" width="285" height="265" rx="10"/>
  <text x="481" y="460" class="label"><tspan x="481" dy="0">items</tspan></text><text x="483" y="490" class="text">id PK</text><text x="483" y="514" class="text">userId FK</text><text x="483" y="538" class="text">folderId FK</text><text x="483" y="562" class="text">type: note/file/</text><text x="483" y="586" class="text">reminder/list</text><text x="483" y="610" class="text">title, content</text><text x="483" y="634" class="text">fileData</text><text x="483" y="658" class="text">reminderAt</text><text x="483" y="682" class="text">status</text>
  <rect class="box" x="890" y="150" width="300" height="160" rx="10"/>
  <text x="906" y="180" class="label"><tspan x="906" dy="0">conversations</tspan></text><text x="908" y="210" class="text">id PK</text><text x="908" y="234" class="text">userId FK</text><text x="908" y="258" class="text">title</text><text x="908" y="282" class="text">createdAt, updatedAt</text>
  <rect class="box4" x="900" y="470" width="300" height="165" rx="10"/>
  <text x="916" y="500" class="label"><tspan x="916" dy="0">messages</tspan></text><text x="918" y="530" class="text">id PK</text><text x="918" y="554" class="text">conversationId FK</text><text x="918" y="578" class="text">role</text><text x="918" y="602" class="text">content</text><text x="918" y="626" class="text">metadata</text>
  <line class="arrow" x1="320" y1="210" x2="470" y2="210"/>
  <rect class="note" x="303" y="184" width="184" height="28"/><text x="395" y="204" text-anchor="middle" class="tiny">1:N</text>
  <line class="arrow" x1="320" y1="260" x2="465" y2="505"/>
  <rect class="note" x="300.5" y="356.5" width="184" height="28"/><text x="392.5" y="376.5" text-anchor="middle" class="tiny">1:N</text>
  <line class="arrow" x1="740" y1="220" x2="890" y2="220"/>
  <rect class="note" x="723" y="194" width="184" height="28"/><text x="815" y="214" text-anchor="middle" class="tiny">users 1:N</text>
  <line class="arrow" x1="1040" y1="310" x2="1045" y2="470"/>
  <rect class="note" x="950.5" y="364" width="184" height="28"/><text x="1042.5" y="384" text-anchor="middle" class="tiny">1:N</text>
  <line class="arrow" x1="610" y1="315" x2="610" y2="430"/>
  <rect class="note" x="518" y="346.5" width="184" height="28"/><text x="610" y="366.5" text-anchor="middle" class="tiny">folders 1:N</text><rect class="note" x="86" y="760" width="1220" height="80" rx="10"/>
  <text x="120" y="792" class="small"><tspan x="120" dy="0">Таблица items хранит основные пользовательские объекты. Значение type определяет тип записи: note, file, reminder или list.</tspan></text></svg>
