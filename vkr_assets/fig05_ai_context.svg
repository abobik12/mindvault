<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #374151; stroke-width: 2; rx: 12; }
      .box2 { fill: #eef6ff; stroke: #374151; stroke-width: 2; rx: 12; }
      .box3 { fill: #f5f7eb; stroke: #374151; stroke-width: 2; rx: 12; }
      .box4 { fill: #fff7ed; stroke: #374151; stroke-width: 2; rx: 12; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .text { font: 400 17px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 15px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line { stroke: #6b7280; stroke-width: 1.8; fill: none; }
      .note { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="900"/>
<text x="44" y="50" class="title"><tspan x="44" dy="0">Схема работы ИИ-ассистента с пользовательским контекстом</tspan></text><text x="44" y="82" class="subtitle"><tspan x="44" dy="0">Контекст строится из сохраненных таблиц и истории сообщений; vector database не используется</tspan></text>
  <rect class="box" x="70" y="160" width="260" height="120" rx="12"/>
  <text x="88" y="191" class="label"><tspan x="88" dy="0">Сообщение</tspan></text>
  <text x="88" y="219" class="text"><tspan x="88" dy="0">текст пользователя</tspan><tspan x="88" dy="20">conversationId</tspan></text>
  <rect class="box2" x="420" y="130" width="330" height="170" rx="12"/>
  <text x="438" y="161" class="label"><tspan x="438" dy="0">buildAssistantContext</tspan></text>
  <text x="438" y="189" class="text"><tspan x="438" dy="0">выборка данных</tspan><tspan x="438" dy="20">по userId</tspan><tspan x="438" dy="20">учет последних объектов</tspan><tspan x="438" dy="20">и истории чата</tspan></text>
  <rect class="box" x="80" y="420" width="240" height="120" rx="12"/>
  <text x="98" y="451" class="label"><tspan x="98" dy="0">folders</tspan></text>
  <text x="98" y="479" class="text"><tspan x="98" dy="0">папки пользователя</tspan><tspan x="98" dy="20">названия и id</tspan></text>
  <rect class="box3" x="360" y="420" width="260" height="150" rx="12"/>
  <text x="378" y="451" class="label"><tspan x="378" dy="0">items</tspan></text>
  <text x="378" y="479" class="text"><tspan x="378" dy="0">notes, files</tspan><tspan x="378" dy="20">lists, reminders</tspan><tspan x="378" dy="20">title/content/summary</tspan></text>
  <rect class="box" x="660" y="420" width="260" height="135" rx="12"/>
  <text x="678" y="451" class="label"><tspan x="678" dy="0">messages</tspan></text>
  <text x="678" y="479" class="text"><tspan x="678" dy="0">история диалогов</tspan><tspan x="678" dy="20">user / assistant</tspan></text>
  <rect class="box4" x="1000" y="150" width="300" height="165" rx="12"/>
  <text x="1018" y="181" class="label"><tspan x="1018" dy="0">Prompt + context</tspan></text>
  <text x="1018" y="209" class="text"><tspan x="1018" dy="0">системное сообщение</tspan><tspan x="1018" dy="20">сохраненные источники</tspan><tspan x="1018" dy="20">текущее сообщение</tspan></text>
  <rect class="box4" x="1000" y="460" width="300" height="135" rx="12"/>
  <text x="1018" y="491" class="label"><tspan x="1018" dy="0">AI API</tspan></text>
  <text x="1018" y="519" class="text"><tspan x="1018" dy="0">OpenAI / OpenRouter</tspan><tspan x="1018" dy="20">Chat Completions</tspan></text>
  <rect class="box3" x="1000" y="680" width="300" height="120" rx="12"/>
  <text x="1018" y="711" class="label"><tspan x="1018" dy="0">Ответ</tspan></text>
  <text x="1018" y="739" class="text"><tspan x="1018" dy="0">сохраняется</tspan><tspan x="1018" dy="20">в messages</tspan></text>
  <line class="arrow" x1="330" y1="220" x2="420" y2="220"/>
  
  <line class="arrow" x1="750" y1="215" x2="1000" y2="215"/>
  <rect class="note" x="783" y="189" width="184" height="28"/><text x="875" y="209" text-anchor="middle" class="tiny">контекст</text>
  <polyline class="arrow" points="535,300 535,380 200,380 200,420"/>
  <rect class="note" x="245" y="350" width="190" height="28"/><text x="340" y="370" text-anchor="middle" class="tiny">select</text>
  <line class="arrow" x1="535" y1="300" x2="490" y2="420"/>
  <rect class="note" x="420.5" y="334" width="184" height="28"/><text x="512.5" y="354" text-anchor="middle" class="tiny">select</text>
  <polyline class="arrow" points="535,300 535,380 790,380 790,420"/>
  <rect class="note" x="565" y="350" width="190" height="28"/><text x="660" y="370" text-anchor="middle" class="tiny">select</text>
  <line class="arrow" x1="1150" y1="315" x2="1150" y2="460"/>
  <rect class="note" x="1058" y="361.5" width="184" height="28"/><text x="1150" y="381.5" text-anchor="middle" class="tiny">request</text>
  <line class="arrow" x1="1150" y1="595" x2="1150" y2="680"/>
  <rect class="note" x="1058" y="611.5" width="184" height="28"/><text x="1150" y="631.5" text-anchor="middle" class="tiny">response</text><rect class="note" x="140" y="720" width="780" height="72" rx="10"/>
  <text x="170" y="750" class="small"><tspan x="170" dy="0">Важно: схема показывает текстовую выборку из сохраненных данных. Семантический поиск и vector database в проекте не реализованы.</tspan></text></svg>
