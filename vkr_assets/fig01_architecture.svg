<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #4b5563; }
      .box { fill: #f8fafc; stroke: #374151; stroke-width: 2; rx: 12; }
      .box2 { fill: #eef6ff; stroke: #374151; stroke-width: 2; rx: 12; }
      .box3 { fill: #f5f7eb; stroke: #374151; stroke-width: 2; rx: 12; }
      .box4 { fill: #fff7ed; stroke: #374151; stroke-width: 2; rx: 12; }
      .label { font: 700 20px Arial, sans-serif; fill: #111827; }
      .text { font: 400 17px Arial, sans-serif; fill: #1f2937; }
      .small { font: 400 15px Arial, sans-serif; fill: #374151; }
      .tiny { font: 400 14px Arial, sans-serif; fill: #4b5563; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line { stroke: #6b7280; stroke-width: 1.8; fill: none; }
      .note { fill: #ffffff; stroke: #9ca3af; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="860"/>
<text x="44" y="50" class="title"><tspan x="44" dy="0">Общая архитектура приложения MindVault</tspan></text><text x="44" y="82" class="subtitle"><tspan x="44" dy="0">Браузерный frontend обращается к Express API; backend работает с PostgreSQL и внешним AI API</tspan></text>
  <rect class="box" x="50" y="170" width="260" height="130" rx="12"/>
  <text x="68" y="201" class="label"><tspan x="68" dy="0">Пользователь</tspan></text>
  <text x="68" y="229" class="text"><tspan x="68" dy="0">Браузер</tspan><tspan x="68" dy="20">настольное или</tspan><tspan x="68" dy="20">мобильное устройство</tspan></text>
  <rect class="box2" x="390" y="150" width="300" height="170" rx="12"/>
  <text x="408" y="181" class="label"><tspan x="408" dy="0">React + Vite frontend</tspan></text>
  <text x="408" y="209" class="text"><tspan x="408" dy="0">SPA-интерфейс</tspan><tspan x="408" dy="20">страницы: чат, заметки,</tspan><tspan x="408" dy="20">файлы, списки,</tspan><tspan x="408" dy="20">напоминания, настройки</tspan></text>
  <rect class="box3" x="780" y="150" width="310" height="170" rx="12"/>
  <text x="798" y="181" class="label"><tspan x="798" dy="0">Express API backend</tspan></text>
  <text x="798" y="209" class="text"><tspan x="798" dy="0">маршруты /api</tspan><tspan x="798" dy="20">авторизация JWT</tspan><tspan x="798" dy="20">CRUD и чат</tspan><tspan x="798" dy="20">загрузка файлов</tspan></text>
  <rect class="box" x="790" y="430" width="285" height="145" rx="12"/>
  <text x="808" y="461" class="label"><tspan x="808" dy="0">Модуль контекста</tspan></text>
  <text x="808" y="489" class="text"><tspan x="808" dy="0">выборка notes/files</tspan><tspan x="808" dy="20">folders/lists/reminders</tspan><tspan x="808" dy="20">история messages</tspan></text>
  <rect class="box4" x="1145" y="160" width="250" height="135" rx="12"/>
  <text x="1163" y="191" class="label"><tspan x="1163" dy="0">PostgreSQL</tspan></text>
  <text x="1163" y="219" class="text"><tspan x="1163" dy="0">users</tspan><tspan x="1163" dy="20">folders, items</tspan><tspan x="1163" dy="20">conversations, messages</tspan></text>
  <rect class="box4" x="1145" y="450" width="250" height="135" rx="12"/>
  <text x="1163" y="481" class="label"><tspan x="1163" dy="0">AI API</tspan></text>
  <text x="1163" y="509" class="text"><tspan x="1163" dy="0">OpenAI / OpenRouter</tspan><tspan x="1163" dy="20">Chat Completions</tspan><tspan x="1163" dy="20">ответ ассистента</tspan></text>
  <line class="arrow" x1="310" y1="235" x2="390" y2="235"/>
  <rect class="note" x="258" y="209" width="184" height="28"/><text x="350" y="229" text-anchor="middle" class="tiny">интерфейс</text>
  <line class="arrow" x1="690" y1="235" x2="780" y2="235"/>
  <rect class="note" x="643" y="209" width="184" height="28"/><text x="735" y="229" text-anchor="middle" class="tiny">/api</text>
  <line class="arrow" x1="1090" y1="230" x2="1145" y2="220"/>
  <rect class="note" x="1025.5" y="199" width="184" height="28"/><text x="1117.5" y="219" text-anchor="middle" class="tiny">SQL</text>
  <line class="arrow" x1="935" y1="320" x2="935" y2="430"/>
  <rect class="note" x="843" y="349" width="184" height="28"/><text x="935" y="369" text-anchor="middle" class="tiny">контекст</text>
  <line class="arrow" x1="1075" y1="500" x2="1145" y2="505"/>
  <rect class="note" x="1018" y="476.5" width="184" height="28"/><text x="1110" y="496.5" text-anchor="middle" class="tiny">prompt</text>
  <polyline class="arrow" points="1145,540 1070,540 1070,555 1085,555"/>
  <rect class="note" x="1015" y="547" width="190" height="28"/><text x="1110" y="567" text-anchor="middle" class="tiny">ответ</text>
  <polyline class="arrow" points="780,275 735,275 735,385 390,385 390,320"/>
  <rect class="note" x="465" y="354" width="190" height="28"/><text x="560" y="374" text-anchor="middle" class="tiny">данные UI</text></svg>
